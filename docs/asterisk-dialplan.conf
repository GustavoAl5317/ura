; ═══════════════════════════════════════════════════════════════════
;  URA AI — Dialplan Asterisk (Issabel)
;
;  COMO APLICAR:
;  1. Copie este conteúdo para /etc/asterisk/extensions_custom.conf
;     no servidor Issabel:
;       nano /etc/asterisk/extensions_custom.conf
;
;  2. Recarregue o dialplan:
;       asterisk -rx "dialplan reload"
;
;  3. Configure o AMI (manager) — veja seção no final deste arquivo
;
;  4. Aponte o DID/tronco para o contexto [ura-ai] no painel Issabel:
;       Connectivity → Inbound Routes → Set Destination:
;       Custom Destination → ura-ai,s,1
;
;  FALLBACK: se pm2 stop, URA desligada no painel ou porta 9019 fora,
;  a chamada vai para o ramal 8000 (fila de atendente) — NÃO cai em silêncio.
; ═══════════════════════════════════════════════════════════════════

[ura-ai]
; Entrada principal — URA no mesmo servidor (127.0.0.1)
exten => s,1,NoOp(=== URA AI - ${CALLERID(num)} ===)

 ; 0. URA online e ligada? (pm2 stop / painel desligado → atendente)
same => n,System(curl -sf --max-time 2 http://127.0.0.1:9020/health | grep -q '"uraEnabled":true')
same => n,GotoIf($["${SYSTEMSTATUS}" = "FAILURE"]?ura-ai,atendente,1)

 ; 1. Registra o CallerID e o canal no sidecar HTTP antes do AudioSocket
 ;    - callerNumber: usado para identificar o cliente automaticamente
 ;    - channel: usado para transferir a chamada via AMI (Redirect) para um atendente
same => n,System(curl -sf -X POST http://127.0.0.1:9020/register \
         -H 'Content-Type: application/json' \
         -d '{"uuid":"${UNIQUEID}","callerNumber":"${CALLERID(num)}","channel":"${CHANNEL}"}' \
         --max-time 2 || true)

 ; 2. Garante formato de áudio correto (slin = PCM 8kHz 16-bit)
same => n,Set(CHANNEL(audioreadformat)=slin)
same => n,Set(CHANNEL(audiowriteformat)=slin)

 ; 3. Conecta ao AudioSocket — UNIQUEID é o UUID que a URA receberá
same => n,AudioSocket(${UNIQUEID},127.0.0.1:9019)

 ; 4. Se a URA caiu no meio da ligação, manda pro atendente (não desliga)
same => n,NoOp(=== AudioSocket encerrou — fallback atendente ===)
same => n,Goto(ura-ai,atendente,1)

; URA offline (pm2 stop / desligada no painel) ou fallback após queda
exten => atendente,1,NoOp(=== URA indisponível → atendente humano ===)
same => n,Goto(from-internal,8000,1)


; ── Destino de transferência e fallback ─────────────────────────────
; Ramal 8000 — fila ou atendente quando URA off ou transferência AMI.
; Ajuste conforme sua fila/ramal real no Issabel.
;
; Opção A — Fila de atendimento (recomendado):
[from-internal]
exten => 8000,1,NoOp(=== Transferência URA → Atendente ===)
same => n,Queue(suporte,t,,,120)
same => n,Hangup()

; Opção B — Ramal direto (se não usar fila):
; exten => 8000,1,Dial(SIP/ramal_atendente,30)
; same => n,Hangup()


; ═══════════════════════════════════════════════════════════════════
;  CONFIGURAÇÃO DO AMI (manager.conf)
;
;  Arquivo: /etc/asterisk/manager.conf
;
;  1. Certifique-se que o manager está habilitado:
;     [general]
;     enabled = yes
;     port = 5038
;     bindaddr = 127.0.0.1
;
;  2. Adicione o usuário da URA:
;     [ura]
;     secret = SENHA_FORTE_AQUI          ← coloque em AST_AMI_PASS no .env (use aspas se tiver #)
;     deny = 0.0.0.0/0.0.0.0
;     permit = 127.0.0.1/255.255.255.255
;     read = system,call,log,verbose,agent,user,config,command,dtmf,reporting,cdr,dialplan
;     write = system,call,agent,user,config,command,reporting,originate
;     writetimeout = 5000
;
;  3. Recarregue:
;     asterisk -rx "module reload manager"
; ═══════════════════════════════════════════════════════════════════
