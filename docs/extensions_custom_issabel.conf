[ura-ai]
exten => s,1,NoOp(=== URA AI - ${CALLERID(num)} ===)
same => n,Set(MYUUID=${SHELL(uuidgen | tr -d '\n')})

; pm2 stop = porta 9019 fechada → fila
same => n,System(nc -z 127.0.0.1 9019)
same => n,GotoIf($[${SYSTEMSTATUS}!=SUCCESS]?atendente,1)

; painel desligado (só se /health existir; se não existir, ignora)
same => n,Set(URA_H=${CURL(http://127.0.0.1:9020/health)})
same => n,ExecIf($[${LEN(${URA_H})}>10]?GotoIf($[${STRINDEX(${URA_H},uraEnabled":true)}<1]?atendente,1))

same => n(ura_ok),Answer()
same => n,System(curl -sf -X POST http://127.0.0.1:9020/register \
         -H 'Content-Type: application/json' \
         -d '{"uuid":"${MYUUID}","callerNumber":"${CALLERID(num)}","channel":"${CHANNEL}"}' \
         --max-time 2 || true)
same => n,Set(CHANNEL(audioreadformat)=slin)
same => n,Set(CHANNEL(audiowriteformat)=slin)
same => n,AudioSocket(${MYUUID},127.0.0.1:9019)
same => n,Goto(atendente,1)

exten => atendente,1,NoOp(=== URA off → fila suporte ===)
same => n,Answer()
same => n,Goto(from-internal,8000,1)

[from-internal]
exten => 8000,1,NoOp(=== Fila suporte ===)
same => n,Queue(suporte,t,,,120)
same => n,Hangup()

[ext-did-custom]
exten => 8532211777,1,Goto(ura-ai,s,1)
exten => 8532213377,1,Goto(ura-ai,s,1)
