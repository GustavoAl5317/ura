; URA AI — /etc/asterisk/extensions_custom.conf (Issabel)
; Teste fallback: pm2 stop ura-ai → liga em 8532211777/3377 → deve tocar nos ramais

[ura-ai]
exten => s,1,NoOp(=== URA AI - ${CALLERID(num)} ===)
same => n,Set(MYUUID=${SHELL(uuidgen | tr -d '\n')})

; pm2 stop = porta 9019 fechada → atendente (NÃO use SYSTEMSTATUS — não funciona no Issabel)
same => n,Set(URA_UP=${SHELL(nc -z -w 2 127.0.0.1 9019 >/dev/null 2>&1; echo $?)})
same => n,GotoIf($[${URA_UP}=0]?ura_ok,1)
same => n,Goto(atendente,1)

; painel desligado (uraEnabled:false no JSON do /health)
same => n(ura_ok),Set(URA_H=${CURL(http://127.0.0.1:9020/health)})
same => n,ExecIf($[${LEN(${URA_H})}>10]?GotoIf($[${STRINDEX(${URA_H},uraEnabled":true)}<1]?atendente,1))

same => n,Answer()
same => n,System(curl -sf -X POST http://127.0.0.1:9020/register -H 'Content-Type: application/json' -d '{"uuid":"${MYUUID}","callerNumber":"${CALLERID(num)}","channel":"${CHANNEL}"}' --max-time 2 || true)
same => n,Set(CHANNEL(audioreadformat)=slin)
same => n,Set(CHANNEL(audiowriteformat)=slin)
same => n,AudioSocket(${MYUUID},127.0.0.1:9019)
same => n,Hangup()

exten => atendente,1,NoOp(=== URA off → ramais 3002/3003 ===)
same => n,Answer()
same => n,Dial(PJSIP/3002&PJSIP/3003,45,g)
same => n,Hangup()

[ext-did-custom]
exten => 8532211777,1,Goto(ura-ai,s,1)
exten => 8532213377,1,Goto(ura-ai,s,1)
